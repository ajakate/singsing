<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>singsing — sight-singing practice</title>
    <style>
      :root { color-scheme: dark; }
      body {
        font-family: system-ui, sans-serif;
        background: #111317; color: #e8eaed;
        margin: 0; padding: 2rem; display: flex; justify-content: center;
      }
      main { width: 100%; max-width: 720px; }
      h1 { font-size: 1.2rem; font-weight: 600; }
      .muted { color: #9aa0a6; font-size: 0.85rem; }
      .countin { display: flex; gap: 0.6rem; margin: 0.5rem 0; }
      .countin .dot { width: 2.2rem; height: 2.2rem; border-radius: 50%;
                      background: #1e2127; border: 2px solid #2a2e37;
                      display: flex; align-items: center; justify-content: center;
                      color: #6b7280; font-size: 0.9rem; transition: all 0.08s; }
      .countin .dot.lit { background: #b88523; border-color: #ffd84d; color: #fff; }
      canvas { width: 100%; height: 280px; background: #16181d;
               border-radius: 0.75rem; margin: 0.25rem 0 1rem; display: block; }
      .controls { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1rem; }
      button { background: #2563eb; color: white; border: 0; padding: 0.6rem 1rem;
               border-radius: 0.5rem; font-size: 0.95rem; cursor: pointer; }
      button.secondary { background: #2a2e37; }
      button:disabled { opacity: 0.5; cursor: default; }
      .sliders { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem;
                 background: #1a1d23; padding: 1rem; border-radius: 0.75rem; }
      .sliders label { display: block; font-size: 0.8rem; color: #9aa0a6;
                       margin-bottom: 0.35rem; }
      .sliders input { width: 100%; }
      .val { color: #e8eaed; font-variant-numeric: tabular-nums; }
      .score { font-size: 1.05rem; margin-top: 1rem; min-height: 1.4rem; }
    </style>
  </head>
  <body>
    <main>
      <h1>singsing <span class="muted">— sight-singing practice</span></h1>
      <p class="muted" id="keyline"></p>

      <div class="countin" id="countin">
        <div class="dot">1</div>
        <div class="dot">2</div>
        <div class="dot">3</div>
        <div class="dot">4</div>
      </div>

      <canvas id="roll"></canvas>

      <div class="controls">
        <button id="regenBtn" class="secondary">🎲 New melody</button>
        <button id="previewBtn" class="secondary">🔊 Preview</button>
        <button id="startBtn">🎤 Start &amp; sing</button>
      </div>

      <div class="sliders">
        <div>
          <label>Tempo <span class="val" id="bpmVal"></span> BPM</label>
          <input type="range" id="bpm" min="40" max="120" step="5" value="60" />
        </div>
        <div>
          <label>Tolerance ±<span class="val" id="tolVal"></span>¢</label>
          <input type="range" id="tol" min="10" max="100" step="5" value="50" />
        </div>
        <div>
          <label>Hold <span class="val" id="holdVal"></span> frames</label>
          <input type="range" id="hold" min="1" max="40" step="1" value="12" />
        </div>
      </div>

      <div class="score" id="score"></div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
